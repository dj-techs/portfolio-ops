name: trending-daily

on:
  schedule:
    - cron: '0 14 * * *'   # 07:00 PT (14:00 UTC)
  workflow_dispatch:        # manual trigger for testing

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # requirements.txt should pin: anthropic, httpx, feedparser, beautifulsoup4, PyGithub

      - name: Run daily scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.PORTFOLIO_PAT }}
        run: python scripts/trending_scan.py --mode daily --max-issues 2

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trending-daily-log-${{ github.run_id }}
          path: logs/
          retention-days: 14
