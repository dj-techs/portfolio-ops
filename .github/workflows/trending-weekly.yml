name: trending-weekly

on:
  schedule:
    - cron: '0 13 * * 0'   # Sunday 06:00 PT (13:00 UTC)
  workflow_dispatch:

# Cancel an in-flight run when the cron and a manual dispatch overlap,
# or on rapid dispatch double-clicks. Distinct group from the other
# workflows so they run concurrently when triggers coincide.
concurrency:
  group: trending-weekly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  discussions: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly deep scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.PORTFOLIO_PAT }}
        run: python scripts/trending_scan.py --mode weekly --max-issues 8 --write-digest

      - name: Prune stale trending issues
        env:
          GH_TOKEN: ${{ secrets.PORTFOLIO_PAT }}
        run: python scripts/prune_stale_trending.py

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trending-weekly-log-${{ github.run_id }}
          path: logs/
          retention-days: 30
